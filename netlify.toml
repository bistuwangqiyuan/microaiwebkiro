# Build Configuration
[build]
  publish = ".next"
  command = "npm run build"
  functions = "netlify/functions"

# Environment Variables (set in Netlify UI)
[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--legacy-peer-deps"

# Redirects and Rewrites
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# Redirect HTTP to HTTPS
[[redirects]]
  from = "http://*"
  to = "https://:splat"
  status = 301
  force = true

# SPA fallback for client-side routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security Headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = """
      default-src 'self';
      script-src 'self' 'unsafe-inline' 'unsafe-eval' https://identity.netlify.com;
      style-src 'self' 'unsafe-inline';
      img-src 'self' data: https: blob:;
      font-src 'self' data:;
      connect-src 'self' https://identity.netlify.com https://*.supabase.co https://api.deepseek.com https://api.glm.ai https://api.moonshot.cn https://api.tongyi.aliyun.com https://api.tencent.com https://api.xfyun.cn https://api.doubao.com https://api.anthropic.com https://api.gemini.google.com https://api.deepai.org;
      frame-src 'self' https://identity.netlify.com;
      object-src 'none';
      base-uri 'self';
      form-action 'self';
    """

# Cache static assets
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# CORS headers for API endpoints
[[headers]]
  for = "/api/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, POST, PUT, DELETE, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Authorization"

# Netlify Identity Configuration
[identity]
  enable = true

[identity.settings]
  enable_signup = true
  
[identity.emails]
  confirmation_template = "confirmation"
  recovery_template = "recovery"
  invite_template = "invite"

# Functions Configuration
[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  
[functions.environment]
  NODE_ENV = "production"